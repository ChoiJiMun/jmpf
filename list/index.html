<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChoiJM™ — Project Archive</title>
  <style>
    :root {
      --bg: #0a0a08;
      --fg: #f0ede6;
      --accent: #ff4500;
      --muted: rgba(240, 237, 230, 0.15);
      --hover: rgba(240, 237, 230, 0.05);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    .header {
      margin-bottom: 48px;
      text-align: center;
    }

    .logo {
      font-family: monospace;
      font-size: 14px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .title {
      font-family: serif;
      font-size: 32px;
      font-weight: 300;
      letter-spacing: -0.02em;
    }

    .list-grid {
      display: grid;
      gap: 16px;
    }

    .list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 32px;
      background: transparent;
      border: 1px solid var(--muted);
      border-radius: 8px;
      text-decoration: none;
      color: var(--fg);
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }

    .list-item::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--hover);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 0;
    }

    .list-item:hover::before {
      transform: translateY(0);
    }

    .list-item:hover {
      border-color: rgba(240, 237, 230, 0.4);
    }

    .item-content {
      position: relative;
      z-index: 1;
    }

    .item-name {
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .item-desc {
      font-size: 13px;
      color: rgba(240, 237, 230, 0.5);
    }

    .item-arrow {
      position: relative;
      z-index: 1;
      font-size: 20px;
      color: var(--accent);
      transition: transform 0.3s ease;
    }

    .list-item:hover .item-arrow {
      transform: translate(4px, -4px);
    }

    .back-link {
      display: inline-block;
      margin-top: 48px;
      color: rgba(240, 237, 230, 0.4);
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.3s ease;
      text-align: center;
      width: 100%;
    }

    .back-link:hover {
      color: var(--fg);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">ChoiJM™</div>
      <h1 class="title">Project Archive</h1>
    </div>

    <div class="list-grid">
      <a href="../smoke/" class="list-item">
        <div class="item-content">
          <div class="item-name">Smoke Project</div>
          <div class="item-desc">View the smoke effect implementation</div>
        </div>
        <div class="item-arrow">↗</div>
      </a>

      <a href="../sudden/" class="list-item">
        <div class="item-content">
          <div class="item-name">Sudden Project</div>
          <div class="item-desc">View the sudden match admin dashboard</div>
        </div>
        <div class="item-arrow">↗</div>
      </a>
    </div>

    <a href="../" class="back-link">← Return to Main Site</a>
  </div>
</body>
</html>
